<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <h2>Admin Panel</h2>
            <nav>
                <a href="#" class="nav-link active" onclick="showSection('dashboard')">Dashboard</a>
                <a href="#" class="nav-link" onclick="showSection('users')">Users</a>
                <a href="#" class="nav-link" onclick="showSection('messages')">Messages</a>
            </nav>
            <button onclick="logout()" class="btn btn-logout">Logout</button>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <!-- Dashboard Stats -->
            <section id="dashboard-section" class="section">
                <h1>Dashboard</h1>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Users</h3>
                        <p id="stat-users">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Total Messages</h3>
                        <p id="stat-messages">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Active Users</h3>
                        <p id="stat-active">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Online Now</h3>
                        <p id="stat-online">0</p>
                    </div>
                </div>
            </section>

            <!-- Users Management -->
            <section id="users-section" class="section hidden">
                <h1>User Management</h1>
                <div class="table-container">
                    <table id="users-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Username</th>
                                <th>Email</th>
                                <th>Status</th>
                                <th>Created</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>

            <!-- Messages -->
            <section id="messages-section" class="section hidden">
                <h1>Message History</h1>
                <div class="filters">
                    <input type="text" id="msg-search" placeholder="Search messages...">
                    <input type="number" id="msg-user-id" placeholder="User ID">
                    <button onclick="loadMessages()" class="btn btn-primary">Search</button>
                </div>
                <div class="table-container">
                    <table id="messages-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>From</th>
                                <th>To</th>
                                <th>Content</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
