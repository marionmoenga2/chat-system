services:
  - type: web
    name: chat-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: chat-db
          property: connectionString

  - type: static
    name: chat-frontend
    plan: free
    buildCommand: echo "No build needed"
    staticPublishPath: frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_URL
        value: https://chat-api.onrender.com

  - type: static
    name: chat-admin
    plan: free
    buildCommand: echo "No build needed"
    staticPublishPath: admin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_URL
        value: https://chat-api.onrender.com

databases:
  - name: chat-db
    plan: free
    databaseName: chat_system
    user: chat_user
