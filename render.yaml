services:
  - type: web
    name: chat-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend/app && python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true

  - type: static
    name: chat-frontend
    plan: free
    buildCommand: echo "No build needed"
    staticPublishPath: frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: static
    name: chat-admin
    plan: free
    buildCommand: echo "No build needed"
    staticPublishPath: admin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
