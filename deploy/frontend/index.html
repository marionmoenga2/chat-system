<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat System - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1>💬 Chat System</h1>
            
            <!-- Login Form -->
            <div id="login-form" class="form-section">
                <h2>Login</h2>
                <form id="loginForm">
                    <div class="input-group">
                        <input type="text" id="login-username" placeholder="Username" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="login-password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                    <p class="toggle-text">Don't have an account? <a href="#" onclick="toggleForms()">Sign up</a></p>
                </form>
            </div>

            <!-- Register Form -->
            <div id="register-form" class="form-section hidden">
                <h2>Sign Up</h2>
                <form id="registerForm">
                    <div class="input-group">
                        <input type="text" id="reg-username" placeholder="Username" required minlength="3">
                    </div>
                    <div class="input-group">
                        <input type="email" id="reg-email" placeholder="Email" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="reg-password" placeholder="Password" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary">Sign Up</button>
                    <p class="toggle-text">Already have an account? <a href="#" onclick="toggleForms()">Login</a></p>
                </form>
            </div>

            <div id="error-message" class="error-message"></div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
